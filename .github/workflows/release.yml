name: Release

# Triggered when you push a version tag: git tag v0.2.0 && git push --tags
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  release:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      contents: write    # create GitHub releases
      id-token: write    # npm provenance (verifiable builds)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Run the full quality gate before publishing — never publish broken code.
      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build (compile TypeScript → dist/)
        run: pnpm -r exec tsc -p tsconfig.json

      # Publish all workspace packages that have changed.
      # Requires NPM_TOKEN in repo secrets (Settings → Secrets → Actions).
      - name: Publish packages
        run: pnpm -r publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a GitHub Release with auto-generated notes from PRs/commits.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
