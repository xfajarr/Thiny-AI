name: Release

# Triggered by every push to main.
# - If there are pending changesets:  opens/updates a "Version Packages" PR.
# - When that PR is merged:           publishes changed packages to npm and
#                                     creates GitHub Releases automatically.
on:
  push:
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    name: Release (changesets)
    runs-on: ubuntu-latest
    permissions:
      contents: write # push version-bump commits + create GitHub Releases
      pull-requests: write # open / update the "Version Packages" PR
      id-token: write # npm provenance (verifiable builds)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history lets changesets compute which packages changed
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Full quality gate — never publish broken code
      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test

      - name: Build packages (ts → dist/)
        run: pnpm -r exec tsc -p tsconfig.json

      # changesets/action does two things depending on state:
      #  a) If changesets exist in .changeset/ → opens a "Version Packages" PR
      #     that bumps versions and updates CHANGELOG files.
      #  b) If main was just merged from a "Version Packages" PR → publishes
      #     to npm and creates GitHub Releases.
      - name: Create release PR or publish
        uses: changesets/action@v1
        with:
          publish: pnpm release
          title: "chore: release packages"
          commit: "chore: release packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
