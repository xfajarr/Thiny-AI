name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  # Cancel in-flight runs for the same branch (saves CI minutes on fast pushes)
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / typecheck / test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── pnpm ─────────────────────────────────────────────────────────────────
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      # ── Node ─────────────────────────────────────────────────────────────────
      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      # ── Install ───────────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Quality gates (run in parallel where possible) ────────────────────────
      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test --reporter=verbose

      # ── (optional) Upload coverage to Codecov ──────────────────────────────
      # Uncomment once you add @vitest/coverage-v8 and set up a Codecov token.
      # - name: Upload coverage
      #   uses: codecov/codecov-action@v4
      #   with:
      #     token: ${{ secrets.CODECOV_TOKEN }}
