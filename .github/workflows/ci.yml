name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / typecheck / test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Lint

      - name: Secret scan

      - name: Dependency audit
        run: pnpm audit --prod || true
        run: pnpm check:secrets
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      - name: Package metadata check
        run: pnpm check:meta

      - name: Build packages
        run: pnpm build

      - name: Export resolution check

      - name: API surface check
        run: pnpm api:check || echo "⚠ API check — review changes"
        run: pnpm check:exports

      # Runs tests + enforces coverage thresholds defined in vitest.config.ts
      - name: Test with coverage
        run: pnpm test:coverage --reporter=verbose

      # Upload lcov report to Codecov (free for OSS).
      # Add CODECOV_TOKEN to repo secrets to enable.
      - name: Upload coverage
        if: matrix.node == '20' # upload once, from Node 20 only
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v4.6.0
        continue-on-error: true # don't fail CI if Codecov is unavailable
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
