name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    name: lint / typecheck / test (Node ${{ matrix.node }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm exec tsc -b

      - name: Lint
        run: pnpm lint

      - name: Format check
        run: pnpm format:check

      # Runs tests + enforces coverage thresholds defined in vitest.config.ts
      - name: Test with coverage
        run: pnpm test:coverage --reporter=verbose

      # Upload lcov report to Codecov (free for OSS).
      # Add CODECOV_TOKEN to repo secrets to enable.
      - name: Upload coverage
        if: matrix.node == '20' # upload once, from Node 20 only
        uses: codecov/codecov-action@v4
        continue-on-error: true # don't fail CI if Codecov is unavailable
        with:
          files: ./coverage/lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
