name: PR check

# Lightweight check that runs only on PRs to catch regressions fast.
# Full matrix runs in ci.yml; this is a single-node fast feedback loop.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quick:
    name: Quick check (Node 20)
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - uses: actions/setup-node@1d0ff469b7ec7b3cb9d8673fde0c81c44821de2a # v4.2.0
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck + Lint + Test
        run: |
          pnpm exec tsc -b
          pnpm lint
           pnpm check:secrets
           pnpm audit --prod || true
          pnpm test

      - name: Package metadata check
        run: pnpm check:meta

      - name: Build + Export check
        run: |
          pnpm build
          pnpm check:exports
