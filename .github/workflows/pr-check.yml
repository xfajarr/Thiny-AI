name: PR check

# Lightweight check that runs only on PRs to catch regressions fast.
# Full matrix runs in ci.yml; this is a single-node fast feedback loop.
on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

concurrency:
  group: pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  quick:
    name: Quick check (Node 20)
    runs-on: ubuntu-latest
    # Skip draft PRs
    if: github.event.pull_request.draft == false

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0
        with:
          version: 9

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Typecheck + Lint + Test
        run: |
          pnpm exec tsc -b
          pnpm lint
           pnpm check:secrets
           pnpm audit --prod || true
          pnpm test

      - name: Package metadata check
        run: pnpm check:meta

      - name: Build + Export check
        run: |
          pnpm build
          pnpm check:exports
